<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-Mate — ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/styles/auth.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-icon"><i class="fas fa-cube"></i></span>
        <h1 class="auth-logo-text">V-Mate</h1>
      </div>
      <p class="auth-tagline">AIコンパニオンと会話しよう</p>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
          </div>
        </div>
        <div id="login-error" class="form-error" style="display:none"></div>
        <button type="submit" class="btn-primary btn-full">ログイン</button>
      </form>

      <div class="auth-divider"><span>または</span></div>

      <a href="/api/auth/google" class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </a>

      <p class="auth-switch">アカウントをお持ちでない方は <a href="/auth/register.html">新規登録</a></p>
    </div>
  </div>

  <script type="module">
    import { authService } from '/src/api/auth.js';
    import { apiFetch } from '/src/api/http.js';

    if (authService.isAuthenticated()) { window.location.href = '/'; }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      try {
        const data = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        authService.setTokens(data.access_token, data.refresh_token, data.user);
        window.location.href = '/';
      } catch (ex) {
        err.textContent = ex.message ?? 'ログインに失敗しました';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
