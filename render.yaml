databases:
  - name: vmate-db
    plan: free
    databaseName: vmate
    user: vmate

services:
  - type: web
    name: vmate-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vmate-db
          property: connectionString
      - key: BIND_ADDR
        value: 0.0.0.0:10000
      - key: AUDIO_DIR
        value: data/audio
      - key: FRONTEND_DIR
        value: static
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-exp
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
